<!DOCTYPE html>
<html lang="bn">
<head>
    <style>
.container {
  background-color: #f1f1f1;
  padding: 10px;
  display: flex;
  flex-direction: row;
  gap: 10px;
}

.container > div {
  background-color: #04AA6D;
  color: white;
  padding: 20px;
  text-align: center;
}

        .card{
    flex:1;
    min-width:250px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার ওয়েবপেজ</title>
</head>
<body>
    <h1>হ্যালো ওয়ার্ল্ড!</h1>
    <p>এটি একটি HTML</p>
    <SECTION> <div class="container">
  <div class="card">1</div>
  <div class="card">2</div>
  <div class="card">3</div>
</div>></SECTION>
</body>
</html>
